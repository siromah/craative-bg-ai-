    <style>
      #loading-root {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #faf8f5; transition: opacity 0.4s ease;
      }
      .dark #loading-root { background: #141414; }
      .loading-brand {
        display: flex; flex-direction: column; align-items: center; gap: 16px;
      }
      .loading-logo {
        width: 48px; height: 48px;
        border-radius: 14px;
        background: linear-gradient(135deg, #c4703a, #a35d2e);
        display: flex; align-items: center; justify-content: center;
        animation: loadingPulse 1.8s ease-in-out infinite;
      }
      .loading-logo-inner {
        width: 16px; height: 16px; background: white; border-radius: 4px;
      }
      .loading-text {
        font-family: 'DM Sans', system-ui, sans-serif;
        font-size: 14px; font-weight: 500; color: #78716c;
        letter-spacing: 0.08em;
      }
      @keyframes loadingPulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.08); opacity: 0.85; }
      }
      #loading-root.hidden { opacity: 0; pointer-events: none; }
    </style>
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem('ailabs_theme');
          const theme =
            savedTheme === 'light' || savedTheme === 'dark'
              ? savedTheme
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.classList.add(theme);
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>

    <div id="root"></div>
    <script>
      (() => {
        const hideLoader = () => {
          const loader = document.getElementById('loading-root');
          if (loader) { loader.classList.add('hidden'); setTimeout(() => loader.remove(), 500); }
        };
        window.addEventListener('DOMContentLoaded', hideLoader);
        setTimeout(hideLoader, 3000);
      })();
    </script>
